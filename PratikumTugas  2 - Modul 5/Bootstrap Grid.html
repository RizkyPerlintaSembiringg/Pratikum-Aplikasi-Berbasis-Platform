<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initialscale=1.0" />
    <title>Bootstrap Grid</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap
.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-4">
      <div class="row">
        <div class="col-12 col-md-8 bg-primary text-white">
          .col-12 .col-md-8
        </div>
      </div>
      <div class="row mt-2">
        <div class="col-6 col-md-4 bg-success text-white">.col-6 .col-md-4</div>
      </div>
      <div class="row mt-2">
        <div class="col-6 col-md-4 bg-danger text-white">1</div>
        <div class="col-6 col-md-4 bg-warning">2</div>
        <div class="col-6 col-md-4 bg-info">3</div>
      </div>
      <div class="row mt-2">
        <div class="col-6 bg-dark text-white">.col-6</div>
        <div class="col-6 bg-secondary text-white">.col-6</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.b
undle.min.js"></script>
  </body>
</html>
