<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initialscale=1.0" />
    <title>Bootstrap Form</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap
.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-4">
      <h3>Horizontal form</h3>
      <form action="/action_page.php">
        <div class="row mb-3">
          <label for="uname" class="col-sm-2 col-formlabel">Username:</label>
          <div class="col-sm-10">
            <input
              type="text"
              class="form-control"
              id="uname"
              placeholder="Enter username"
              name="uname"
            />
          </div>
        </div>
        <div class="row mb-3">
          <label for="pwd" class="col-sm-2 col-formlabel">Password:</label>
          <div class="col-sm-10">
            <input
              type="password"
              class="form-control"
              id="pwd"
              placeholder="Enter password"
              name="pwd"
            />
          </div>
        </div>
        <div class="row">
          <div class="col-sm-10 offset-sm-2">
            <button type="submit" class="btn btnsuccess">Submit</button>
          </div>
        </div>
      </form>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.b
undle.min.js"></script>
  </body>
</html>
